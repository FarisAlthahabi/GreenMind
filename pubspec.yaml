name: green_mind
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  bloc: ^9.2.1
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  pretty_dio_logger: ^1.4.0
  logger: ^2.7.0
  dio: ^5.9.2
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  json_annotation: ^4.12.0
  shimmer: ^3.0.0
  injectable: ^3.0.0
  injectable_generator: ^3.0.2
  meta: ^1.17.0
  flutter_spinkit: ^5.2.2
  auto_route_generator: ^10.5.0
  auto_route: ^11.1.0
  easy_localization: ^3.0.8
  flutter_launcher_icons: ^0.14.4
  another_flushbar: ^2.2.4
  connectivity_plus: ^7.1.1
  flutter_svg: ^2.3.0
  flutter_gen: ^5.14.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  flutter_gen_runner:
  json_serializable: ^6.14.0


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/green_mind_png.png"
  background_color: "#FFFFFF"
  android_adaptive_icon_background: "#FFFFFF"
  min_sdk_android: 21 # android min sdk min:16, default 21  

flutter_gen:
  output: lib/global/gen/

  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/locales/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/Cairo-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo-Black.ttf
          weight: 900

scripts:
  build: dart run build_runner build --delete-conflicting-outputs
  watch: dart run build_runner watch --delete-conflicting-outputs    
  buildlogo: dart run flutter_launcher_icons