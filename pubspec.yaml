name: green_mind
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  bloc: ^9.2.1
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  pretty_dio_logger: ^1.4.0
  logger: ^2.7.0
  dio: ^5.9.2
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  json_annotation: ^4.12.0
  shimmer: ^3.0.0
  injectable: ^3.0.0
  injectable_generator: ^3.0.2
  meta: ^1.17.0
  flutter_spinkit: ^5.2.2
  auto_route_generator: ^10.5.0
  auto_route: ^11.1.0
  easy_localization: ^3.0.8
  flutter_launcher_icons: ^0.14.4
  another_flushbar: ^2.2.4
  connectivity_plus: ^7.1.1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  json_serializable: ^6.14.0
  flutter_gen_runner: ^5.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_logo.png"
  background_color: "#FFFFFF"
  android_adaptive_icon_background: "#FFFFFF"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/png/
    - assets/images/svg/
    - assets/locales/

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

scripts:
  build: dart run build_runner build --delete-conflicting-outputs
  watch: dart run build_runner watch --delete-conflicting-outputs

flutter_assets:
  assets_path: assets/images/
  output_path: lib/global/utils
  filename: app_images.dart
  field_prefix:
